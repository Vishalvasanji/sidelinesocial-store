<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" width="720" height="640" fill="none" role="img" aria-label="Westview Wolves team store preview">
  <defs>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="chipShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2c33"/>
      <stop offset="1" stop-color="#13141900" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Store-preview card -->
  <g filter="url(#cardShadow)">
    <rect x="120" y="80" width="480" height="400" rx="22" fill="#17181c" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.5"/>
  </g>

  <!-- Card header: logo + team name + LIVE pill -->
  <rect x="150" y="108" width="32" height="32" rx="8" fill="#3B82F6"/>
  <text x="166" y="131" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" fill="#ffffff">W</text>
  <text x="195" y="130" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" letter-spacing="0.8" fill="#ffffff">WESTVIEW WOLVES</text>
  <rect x="504" y="110" width="62" height="24" rx="12" fill="#FB6A45"/>
  <text x="535" y="126" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="800" letter-spacing="1" fill="#ffffff">LIVE</text>
  <line x1="150" y1="160" x2="570" y2="160" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Product grid (3 x 2) -->
  <!-- Row 1 -->
  <rect x="150" y="182" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="191" y="224" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
  <rect x="296" y="182" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="337" y="224" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M2 14h20M4 14a8 8 0 0 1 16 0M9 14V9a3 3 0 0 1 6 0v5"/></svg>
  <rect x="442" y="182" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="483" y="224" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
  <!-- Row 2 -->
  <rect x="150" y="328" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="191" y="370" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M6 3h12l-1 7H7z"/><path d="M7 10l-1 11h5l1-6 1 6h5L17 10"/></svg>
  <rect x="296" y="328" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="337" y="370" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
  <rect x="442" y="328" width="128" height="130" rx="12" fill="url(#tileGrad)" stroke="#ffffff" stroke-opacity="0.07"/>
  <svg x="483" y="370" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.3"><path d="M2 14h20M4 14a8 8 0 0 1 16 0M9 14V9a3 3 0 0 1 6 0v5"/></svg>

  <!-- Floating product chip: hoodie -->
  <g filter="url(#chipShadow)">
    <rect x="64" y="250" width="182" height="62" rx="15" fill="#1c1d22" stroke="#ffffff" stroke-opacity="0.16"/>
  </g>
  <rect x="76" y="262" width="38" height="38" rx="10" fill="#131419"/>
  <svg x="85" y="271" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.5"><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></svg>
  <text x="124" y="281" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="800" letter-spacing="0.4" fill="#ffffff">PERFORMANCE HOODIE</text>
  <text x="124" y="299" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" fill="#3B82F6">$48</text>

  <!-- Floating product chip: hat -->
  <g filter="url(#chipShadow)">
    <rect x="466" y="418" width="178" height="62" rx="15" fill="#1c1d22" stroke="#ffffff" stroke-opacity="0.16"/>
  </g>
  <rect x="478" y="430" width="38" height="38" rx="10" fill="#131419"/>
  <svg x="487" y="439" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="1.5"><path d="M2 14h20M4 14a8 8 0 0 1 16 0M9 14V9a3 3 0 0 1 6 0v5"/></svg>
  <text x="526" y="449" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="800" letter-spacing="0.4" fill="#ffffff">TRUCKER HAT</text>
  <text x="526" y="467" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" fill="#3B82F6">$24</text>
</svg>
